name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (for musl target)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross (for cross-compilation)
        if: matrix.target != 'x86_64-unknown-linux-gnu' && matrix.target != 'x86_64-pc-windows-msvc' && matrix.target != 'x86_64-apple-darwin'
        run: cargo install cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.target }}" = "aarch64-apple-darwin" ]; then
            rustup target add aarch64-apple-darwin
            cargo build --release --target ${{ matrix.target }}
          elif [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            cargo build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        shell: bash
        run: |
          BINARY_DIR=target/${{ matrix.target }}/release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            BINARY_NAME=evidger-cli.exe
          else
            BINARY_NAME=evidger-cli
          fi
          ARCHIVE_NAME=evidger-cli-${{ github.ref_name }}-${{ matrix.target }}.zip

          # Create archive from binary
          cd $BINARY_DIR
          zip ../../$ARCHIVE_NAME $BINARY_NAME

          # Generate checksum
          cd ../..
          sha256sum $ARCHIVE_NAME > $ARCHIVE_NAME.sha256

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            evidger-cli-${{ github.ref_name }}-${{ matrix.target }}.zip
            evidger-cli-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}